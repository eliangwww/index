<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamicTitle">Loading...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background-color: #000; /* 视频加载前的背景色 */
        }

        /* 全屏背景视频 */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* 标题样式：增加文字阴影提高可读性 */
        h1 {
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-size: 2.5rem;
            z-index: 1;
        }

        .container {
            width: 80%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
        }

        /* 超透明链接卡片样式 */
        .link-card {
            /* 关键修改：背景设为几乎全透明 (0.05) */
            background-color: rgba(255, 255, 255, 0.05);
            /* 移除了 backdrop-filter (模糊效果)，让背景彻底透出来 */
            /* 移除了 1px solid rgba(255, 255, 255, 0.2); 边框 */
            
            border-radius: 12px;
            padding: 20px;
            margin: 15px;
            text-align: center;
            width: 200px;
            /* 增加过渡效果的时间，让显现更柔和 */
            transition: all 0.4s ease;
            cursor: pointer;
        }

        /* 悬停时：卡片显现，增加不透明度 */
        .link-card:hover {
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.2); /* 悬停时恢复一定不透明度，增加反馈 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .link-card a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            display: block;
            /* 增加文字阴影，防止文字在亮色背景下看不清 */
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        /* 右下角声音状态提示 */
        #audioStatus {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="https://backup.paste.916300.xyz/api/file-view/kcI1Po" type="video/mp4">
        您的浏览器不支持视频标签。
    </video>

    <h1 id="dynamicH1"></h1>

    <div class="container">
        <div class="link-card">
            <a href="https://url.916300.xyz/advanced-proxy?url=http%3A%2F%2Ft.me%2Fbmchatting_bot" target="_blank">Contact Me</a>
        </div>
    </div>

    <div id="audioStatus">点击页面任意位置开启声音 🔊</div>

    <script>
        const video = document.getElementById('bgVideo');
        const audioStatus = document.getElementById('audioStatus');

        // 1. 动态设置标题
        const hostname = window.location.hostname || "MY WEBSITE";
        const uppercaseHostname = hostname.toUpperCase();
        document.getElementById('dynamicTitle').textContent = uppercaseHostname;
        document.getElementById('dynamicH1').textContent = uppercaseHostname;

        // 2. 核心逻辑：用户点击后开启声音
        document.body.addEventListener('click', function() {
            if (video.muted) {
                video.muted = false;
                // 尝试播放（以防万一自动播放被彻底拦截）
                video.play().catch(error => {
                    console.log("播放失败:", error);
                });
                audioStatus.textContent = "声音已开启 ✅";
                // 3秒后隐藏提示
                setTimeout(() => {
                    audioStatus.style.opacity = '0';
                    audioStatus.style.transition = 'opacity 1s';
                }, 3000);
            }
        }, { once: false }); // 如果你想让用户可以反复切换，这里设为 false

        // 复制函数（保留备用）
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                alert('链接已复制!');
            }, function(err) {
                alert('复制失败: ' + err);
            });
        }
    </script>
</body>
</html>
